<!doctype html><html><head><meta charset='utf-8'><title>FoodVerse</title><link rel='stylesheet' href='style.css'></head><body><header><h1>🍽 FoodVerse</h1><input id='s' placeholder='Search recipes...'></header><h2>Vegetarian Recipes</h2><div id='list'></div><script>const r=[...Array(100)].map((_,i)=>({n:['Paneer','Dosa','Idli','Pulao','Dal','Paratha','Poha','Upma','Noodles','Salad'][i%10]+' '+(i+1)}));const l=document.getElementById('list');function draw(q=''){l.innerHTML='';r.filter(x=>x.n.toLowerCase().includes(q.toLowerCase())).forEach(x=>{let d=document.createElement('div');d.className='card';d.innerHTML='<h3>'+x.n+'</h3><button>View Recipe</button>';l.appendChild(d);});}draw();s.oninput=e=>draw(e.target.value);</script></body></html>
